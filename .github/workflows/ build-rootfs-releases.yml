name: 编译并发布 Droidspaces RootFS

on:
  workflow_dispatch: 
    inputs:
      build_target:
        description: '选择要构建的发行版'
        required: true
        type: choice
        default: 'Debian-13-KDE'
        options:                           
          - 'Debian-13-KDE'  
          - 'Debian-12-KDE'
          - 'Ubuntu-24-KDE'
          - 'Ubuntu-25-KDE'
          - 'Fedora-42-KDE'
          - 'Fedroa-43-KDE'
          - 'Arch-KDE'
          - 'all'
      build_KDE:
        description: 'KDE桌面选择(conc-精简 min-最小构造 none-不用KDE)'
        required: true
        type: choice
        default: 'min'
        options: 
          - 'conc'
          - 'min'
          - 'none'
      PulseAudio:
        description: 'PulseAudio 音频转发'
        required: true
        type: choice
        default: 'tcp'
        options: 
          - 'socket'
          - 'tcp'
          - 'none'
      build_browser:
        description: '默认浏览器'
        required: true
        type: choice
        default: 'firefox'
        options:
          - 'firefox'
          - 'chromium'
          - 'none'
      rootfs_username:
        description: 'RootFS default username'
        required: true
        type: string
        default: 'Gold'
      enable_zh_tz:
        description: '使用 中文 语言，并更改时区'
        required: true
        type: boolean
        default: true
      enable_mesa:
        description: '开启 高通骁龙GPU 支持'
        required: true
        type: boolean
        default: true
      enable_tmoe:
        description: '集成 TMOE '
        required: true
        type: boolean
        default: true
      enable_srf:
        description: '开启 输入法 fcitx5 支持'
        required: true
        type: boolean
        default: false
      enable_app_store:
        description: 'Install KDE Discover app store'
        required: true
        type: boolean
        default: false
      enable_binfmt:
        description: '开启 跨架构 支持'
        required: true
        type: boolean
        default: false
      enable_yj:
        description: '开启 容器识别部分硬件和网络 支持'
        required: true
        type: boolean
        default: false
      enable_kfgj:
        description: '开发工具 集成'
        required: true
        type: boolean
        default: false
      enable_zip:
        description: '压缩工具 集成'
        required: true
        type: boolean
        default: true
      enable_docker:
        description: 'Docker 集成'
        required: true
        type: boolean
        default: false    

jobs:
  # --------------------------------------------------------
  # 阶段 1: setup (环境准备与变量生成)
  # --------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find-templates.outputs.templates }}
      build_id: ${{ steps.prep.outputs.build_id }}
      build_date: ${{ steps.prep.outputs.build_date }}
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 解析用户的构建选择
        id: find-templates
        run: |
          TARGET="${{ github.event.inputs.build_target }}"
          
          if [ "$TARGET" = "all" ]; then
            TEMPLATES=$(ls *.Dockerfile | sed 's/\.Dockerfile//' | jq -R -s -c 'split("\n")[:-1]')
          else
            TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
          fi
          
          echo "templates=$TEMPLATES" >> $GITHUB_OUTPUT
          echo "最终决定的构建矩阵: $TEMPLATES"

      - name: 准备构建元数据
        id: prep
        run: |
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          BUILD_ID="v$(date +'%Y%m%d-%H%M%S')"
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "构建 ID: $BUILD_ID"

  # --------------------------------------------------------
  # 阶段 2: build (常规 Linux 发行版 RootFS 的构建)
  # --------------------------------------------------------
  build:
    needs: setup
    if: ${{ needs.setup.outputs.templates != '[]' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.setup.outputs.templates) }}
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 编译 RootFS (${{ matrix.template }})
        run: |
          chmod +x build_rootfs-native.sh
          ./build_rootfs-native.sh \
            -i "${{ matrix.template }}.Dockerfile" \
            -v "${{ needs.setup.outputs.build_id }}" \
            -K "${{ inputs.build_KDE }}" \
            -P "${{ inputs.PulseAudio }}" \
            -w "${{ inputs.build_browser }}" \
            -u "${{ inputs.rootfs_username }}" \
            -g "${{ inputs.enable_zh_tz }}" \
            -a "${{ inputs.enable_binfmt }}" \
            -b "${{ inputs.enable_yj }}" \
            -c "${{ inputs.enable_mesa }}" \
            -d "${{ inputs.enable_kfgj }}" \
            -e "${{ inputs.enable_zip }}" \
            -f "${{ inputs.enable_docker }}" \
            -h "${{ inputs.enable_srf }}" \
            -s "${{ inputs.enable_app_store }}" \
            -j "${{ inputs.enable_tmoe }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.template }}-rootfs
          path: "*.tar.xz"
          retention-days: 1

  # --------------------------------------------------------
  # 阶段 3: release (汇总发布)
  # --------------------------------------------------------
  release:
    needs: [setup, build]
    if: ${{ always() && needs.setup.result == 'success' && needs.build.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4
        
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          pattern: "*-rootfs"
          merge-multiple: true
          
      - name: 整理资源
        run: |
          mkdir -p release_assets
          mv *.tar.xz release_assets/
          PA_CHOICE="${{ github.event.inputs.PulseAudio }}"
          if [ "$PA_CHOICE" != "none" ]; then
            cp "scripts/on_aaudio_${PA_CHOICE}.sh" release_assets/
            sed -i 's/^USERNAME=.*/USERNAME="${{ github.event.inputs.rootfs_username }}"/' "release_assets/on_aaudio_${PA_CHOICE}.sh"
          fi
          
      - name: 创建统一 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.build_id }}
          name: "Droidspaces RootFS ${{ needs.setup.outputs.build_id }}"
          files: "release_assets/*"
          body: |
            Droidspaces RootFS 自动构建
            构建时间 : ${{ needs.setup.outputs.build_date }}
            构建目标（用户指定）: ${{ github.event.inputs.build_target }}
            构建 ID: ${{ needs.setup.outputs.build_id }}

            构建选项:
            - **KDE 桌面**: ${{ github.event.inputs.build_KDE }}
            - PulseAudio 音频转发: ${{ github.event.inputs.PulseAudio }}
            - 默认浏览器: ${{ github.event.inputs.build_browser }}
            - RootFS 默认用户名: ${{ github.event.inputs.rootfs_username }}
            - 使用中文作为主语言: ${{ github.event.inputs.enable_zh_tz }}
            - 高通骁龙 GPU 支持: ${{ github.event.inputs.enable_mesa }}
            - 集成 TMOE : ${{ github.event.inputs.enable_tmoe }}
            - 输入法 fcitx5 支持: ${{ github.event.inputs.enable_srf }}
            - KDE Discover 软件商店: ${{ github.event.inputs.enable_app_store }}
            - 跨架构支持: ${{ github.event.inputs.enable_binfmt }}
            - 容器硬件与网络识别支持: ${{ github.event.inputs.enable_yj }}
            - 开发工具集成: ${{ github.event.inputs.enable_kfgj }}
            - 压缩工具集成: ${{ github.event.inputs.enable_zip }}
            - Docker 集成: ${{ github.event.inputs.enable_docker }}
            
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
